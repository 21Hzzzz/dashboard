services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    expose:
      - "3000"
    volumes:
      - ./data:/data

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/cloudflare-trusted-proxies.caddy:/etc/caddy/cloudflare-trusted-proxies.caddy:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
